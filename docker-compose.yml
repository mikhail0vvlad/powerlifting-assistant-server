# Production-oriented compose for a single-VPS deployment.
#
# - `app` runs the Ktor server. It connects to PostgreSQL via DATABASE_URL,
#   either to the bundled `db` service (uncomment) or to a managed DB like Neon.
# - The Firebase service account JSON is mounted read-only into the container.
#
# Usage on the VPS:
#   1) Copy your firebase service-account JSON to ./secrets/firebase.json
#   2) Copy .env.example to .env and fill in DATABASE_URL etc.
#   3) `docker compose up -d --build`
#   4) `docker compose logs -f app` to tail logs
#
# Reverse proxy with TLS (Caddy/Nginx) is expected to sit in front of this
# container — see DEPLOYMENT.md for an example Caddy config.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: powerlifting-assistant-server:latest
    container_name: powerlifting-assistant-server
    restart: unless-stopped
    ports:
      # Bind to localhost only — let the reverse proxy on the host expose 443.
      - "127.0.0.1:8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase.json
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-false}
      DEV_BYPASS_AUTH: "false"
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError"
    volumes:
      - ./secrets/firebase.json:/run/secrets/firebase.json:ro
    mem_limit: 768m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    # Uncomment the following two lines if you also run the bundled `db` service:
    # depends_on:
    #   db: { condition: service_healthy }

  # ------------------------------------------------------------
  # Optional local Postgres. Keep commented out if you use Neon.
